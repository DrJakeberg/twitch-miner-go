services:
  twitch-miner-go:
    image: ${TWITCH_MINER_IMAGE:-ghcr.io/drjakeberg/twitch-miner-go:latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
    volumes:
      - ./configs:/configs:ro
      - twitch-miner-data:/data
    healthcheck:
      test: ["CMD", "/twitch-miner-go", "-version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  twitch-miner-data:
